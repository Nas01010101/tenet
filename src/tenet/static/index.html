<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tenet — a ledger of beliefs across time</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23f7f5f0'/%3E%3Ctext x='16' y='24' font-family='Georgia,serif' font-size='24' font-weight='bold' fill='%231a1814' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --paper:#f7f5f0; --card:#fffdf9; --ink:#1a1814; --muted:#8a8377;
    --hair:#e2ddd2; --hair-dark:#c9c2b2; --red:#9a2b21; --red-pale:rgba(154,43,33,.07);
    --wash:#f3edda;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font:16px/1.55 var(--serif);
    display:flex; flex-direction:column;
  }
  ::selection{background:var(--wash)}

  /* ---------- header : masthead ---------- */
  header{
    padding:18px 28px 12px;
    display:flex; align-items:baseline; gap:18px; flex-wrap:wrap;
    border-bottom:3px double var(--hair-dark);
  }
  .logo{
    font-family:var(--serif); font-size:26px; font-weight:700;
    letter-spacing:.42em; margin-right:-0.42em; text-transform:uppercase;
  }
  .tag{color:var(--muted); font-style:italic; font-size:15px}
  header .spacer{flex:1}
  button{
    font:12px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase;
    background:transparent; color:var(--ink); border:1px solid var(--hair-dark);
    border-radius:2px; padding:9px 14px; cursor:pointer;
    transition:background .15s,border-color .15s,color .15s;
  }
  button:hover{border-color:var(--ink)}
  button:disabled{opacity:.4; cursor:not-allowed}
  button.primary{background:var(--ink); color:var(--card); border-color:var(--ink)}
  button.primary:hover{background:#000}

  /* ---------- layout ---------- */
  main{flex:1; display:flex; gap:0; min-height:0; overflow:hidden}
  .pane{display:flex; flex-direction:column; min-height:0; min-width:0}
  #chat-pane{flex:1.05; border-right:1px solid var(--hair)}
  #belief-pane{flex:1; background:var(--card)}
  .pane-head{
    padding:12px 28px; font:11px/1 var(--mono); letter-spacing:.22em;
    text-transform:uppercase; color:var(--muted);
    border-bottom:1px solid var(--hair);
    display:flex; align-items:center; gap:12px;
  }

  /* ---------- chat : transcript ---------- */
  #messages{flex:1; overflow-y:auto; padding:10px 28px 18px}
  .msg{
    padding:13px 0 11px; border-bottom:1px solid var(--hair);
    display:grid; grid-template-columns:64px 1fr; gap:14px;
    white-space:pre-wrap; word-wrap:break-word;
  }
  .msg .role{
    font:10px/2.1 var(--mono); letter-spacing:.18em; color:var(--muted);
    text-transform:uppercase; user-select:none;
  }
  .msg.tenet .role{color:var(--ink)}
  .msg.user .body{color:#54503f; font-style:italic}
  .note{
    grid-column:2; padding:6px 0 12px; border-bottom:1px solid var(--hair);
    padding-left:78px;
    font:11px/1.6 var(--mono); letter-spacing:.06em; color:var(--red);
  }
  .note.empty{color:var(--muted)}
  #chat-form{display:flex; gap:10px; padding:14px 28px; border-top:1px solid var(--hair)}
  #chat-input{
    flex:1; background:var(--card); border:1px solid var(--hair-dark); border-radius:2px;
    color:var(--ink); font:15px/1.4 var(--serif); padding:10px 12px;
  }
  #chat-input:focus{outline:none; border-color:var(--ink)}

  /* ---------- belief ledger ---------- */
  #timetravel{padding:14px 28px 12px; border-bottom:1px solid var(--hair)}
  #timetravel .row{display:flex; align-items:center; gap:12px}
  #tt-slider{
    flex:1; -webkit-appearance:none; appearance:none; height:1px;
    background:var(--hair-dark); outline:none;
  }
  #tt-slider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:11px; height:11px;
    border-radius:50%; background:var(--ink); border:2px solid var(--card);
    box-shadow:0 0 0 1px var(--ink); cursor:ew-resize;
  }
  #tt-slider:disabled::-webkit-slider-thumb{background:var(--hair-dark); box-shadow:0 0 0 1px var(--hair-dark)}
  #tt-label{font:11px/1 var(--mono); letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); margin-top:10px}
  #tt-label.live{color:var(--ink)}
  #tt-label.past{color:var(--red)}
  #beliefs{flex:1; overflow-y:auto; padding:6px 28px 20px}
  .belief-group{padding:14px 0 4px; border-bottom:1px solid var(--hair)}
  .belief-key{
    font:10px/1 var(--mono); letter-spacing:.2em; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px;
  }
  .belief-row{
    display:flex; align-items:baseline; gap:12px; padding:4px 0 8px;
    font-size:15.5px;
  }
  .belief-row .txt{flex:1; min-width:0}
  .belief-row .ts{
    font:10.5px/1.6 var(--mono); color:var(--muted); white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  .belief-row.superseded .txt{
    color:var(--muted); text-decoration:line-through;
    text-decoration-color:var(--red); text-decoration-thickness:1px;
    font-size:14px;
  }
  .belief-row.superseded .stamp{
    font:9px/1 var(--mono); letter-spacing:.14em; color:var(--red);
    border:1px solid currentColor; border-radius:2px; padding:2px 5px;
    text-transform:uppercase; white-space:nowrap;
  }
  .belief-row.just-changed{animation:inkwash 1.4s ease-out}
  @keyframes inkwash{0%{background:var(--wash)} 100%{background:transparent}}
  #beliefs .empty{color:var(--muted); font-style:italic; padding:26px 0}

  /* ---------- footer : totals ---------- */
  footer{
    display:flex; align-items:center; gap:22px; padding:11px 28px;
    border-top:3px double var(--hair-dark);
    font:11px/1 var(--mono); letter-spacing:.1em; color:var(--muted);
    text-transform:uppercase;
  }
  footer b{color:var(--ink); font-weight:600}
  footer .spacer{flex:1}
  footer .sup b{color:var(--red)}

  @media (max-width:860px){
    main{flex-direction:column; overflow:auto}
    #chat-pane{border-right:none; border-bottom:1px solid var(--hair)}
    .pane{min-height:45vh}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Tenet</div>
  <div class="tag">a ledger of beliefs across time — facts change; the ledger stays true.</div>
  <div class="spacer"></div>
  <button id="btn-demo" class="primary">Run the story</button>
  <button id="btn-reset">Clean slate</button>
</header>

<main>
  <section id="chat-pane" class="pane">
    <div class="pane-head">Transcript</div>
    <div id="messages"></div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="Tell Tenet something…" autocomplete="off">
      <button class="primary" type="submit">Send</button>
    </form>
  </section>

  <section id="belief-pane" class="pane">
    <div class="pane-head">Belief ledger</div>
    <div id="timetravel">
      <div class="row">
        <input id="tt-slider" type="range" min="0" max="100" value="100" disabled>
        <button id="tt-now" disabled>Now</button>
      </div>
      <div id="tt-label" class="live">Live — current beliefs</div>
    </div>
    <div id="beliefs"><div class="empty">No beliefs yet — say something in the transcript.</div></div>
  </section>
</main>

<footer>
  <span><b id="f-current">0</b> current</span>
  <span class="sup"><b id="f-superseded">0</b> superseded</span>
  <span><b id="f-archived">0</b> archived</span>
  <span class="spacer"></span>
  <span id="f-provider">provider: …</span>
</footer>

<script>
(function () {
  "use strict";

  const $ = (sel) => document.querySelector(sel);
  const messagesEl = $("#messages"), beliefsEl = $("#beliefs");
  const slider = $("#tt-slider"), ttLabel = $("#tt-label"), ttNowBtn = $("#tt-now");
  const chatForm = $("#chat-form"), chatInput = $("#chat-input");

  let liveMode = true;          // false while scrubbing the time-travel slider
  let prevStatus = new Map();   // belief id -> last-seen status, to detect changes
  let history = [];             // full (as_of=null) belief list, cached for the slider bounds

  function hasCookie(name) {
    return document.cookie.split("; ").some((c) => c.startsWith(name + "="));
  }

  async function api(path, opts) {
    const r = await fetch(path, Object.assign({ credentials: "same-origin" }, opts));
    if (!r.ok) throw new Error(`${path} -> ${r.status}`);
    return r.json();
  }

  function fmtTs(ts) {
    return new Date(ts * 1000).toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
  }

  // The distiller sometimes emits "key=value" / "key value" text; the panel
  // shows the key as the group heading already, so strip the redundant prefix.
  function cleanText(text, key) {
    if (!key) return text;
    const esc = key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return text.replace(new RegExp("^\\s*" + esc + "\\s*[=:]?\\s*", "i"), "") || text;
  }

  // ---- transcript ---------------------------------------------------------
  function appendMsg(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    const label = document.createElement("span");
    label.className = "role";
    label.textContent = role === "user" ? "You" : "Tenet";
    const body = document.createElement("span");
    body.className = "body";
    body.textContent = text;
    div.appendChild(label);
    div.appendChild(body);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendChip(learned, superseded) {
    const note = document.createElement("div");
    if (!learned && !superseded) {
      note.className = "note empty";
      note.textContent = "— nothing new recorded";
    } else {
      const parts = [];
      if (learned) parts.push(`+${learned} fact${learned === 1 ? "" : "s"} recorded`);
      if (superseded) parts.push(`${superseded} superseded`);
      note.className = "note";
      note.textContent = "— " + parts.join(" · ");
    }
    messagesEl.appendChild(note);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage(text) {
    text = text.trim();
    if (!text) return;
    appendMsg("user", text);
    chatInput.value = "";
    const thinking = appendMsg("tenet", "…");
    let out;
    try {
      out = await api("/chat", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }) });
    } catch (e) {
      thinking.querySelector(".body").textContent = "(error reaching tenet — is the API running?)";
      return;
    }
    thinking.querySelector(".body").textContent = out.reply || "(no reply)";
    appendChip(out.facts_added, out.superseded);
    if (liveMode) await refreshState(null);
  }

  chatForm.addEventListener("submit", (e) => { e.preventDefault(); sendMessage(chatInput.value); });

  // ---- belief ledger -------------------------------------------------------
  function groupByKey(beliefs) {
    const groups = new Map();
    for (const b of beliefs) {
      if (!groups.has(b.key)) groups.set(b.key, []);
      groups.get(b.key).push(b);
    }
    return groups;
  }

  function renderBeliefs(beliefs) {
    beliefsEl.innerHTML = "";
    if (!beliefs.length) {
      beliefsEl.innerHTML = '<div class="empty">No beliefs yet — say something in the transcript.</div>';
      return;
    }
    const groups = groupByKey(beliefs);
    for (const [key, rows] of groups) {
      rows.sort((a, b) => a.valid_at - b.valid_at); // history oldest -> newest, current last
      const group = document.createElement("div");
      group.className = "belief-group";
      const label = document.createElement("div");
      label.className = "belief-key";
      label.textContent = key;
      group.appendChild(label);
      for (const b of rows) {
        const row = document.createElement("div");
        row.className = "belief-row " + b.status;
        const txt = document.createElement("span");
        txt.className = "txt";
        txt.textContent = cleanText(b.text, b.key);
        row.appendChild(txt);
        if (b.status === "superseded") {
          const stamp = document.createElement("span");
          stamp.className = "stamp";
          stamp.textContent = "superseded";
          row.appendChild(stamp);
        }
        const ts = document.createElement("span");
        ts.className = "ts";
        ts.textContent = fmtTs(b.valid_at);
        row.appendChild(ts);
        if (prevStatus.get(b.id) && prevStatus.get(b.id) !== b.status) {
          row.classList.add("just-changed");
        }
        group.appendChild(row);
      }
      beliefsEl.appendChild(group);
    }
    const nextStatus = new Map();
    for (const b of beliefs) nextStatus.set(b.id, b.status);
    prevStatus = nextStatus;
  }

  function updateFooter(stats, provider) {
    $("#f-current").textContent = stats.current;
    $("#f-superseded").textContent = stats.superseded;
    $("#f-archived").textContent = stats.archived;
    $("#f-provider").textContent = "provider: " + (provider || "?");
  }

  function updateSliderBounds() {
    if (!history.length) { slider.disabled = true; ttNowBtn.disabled = true; return; }
    const min = Math.floor(Math.min(...history.map((b) => b.valid_at)));
    const max = Math.ceil(Date.now() / 1000);
    slider.min = min; slider.max = max;
    if (liveMode) slider.value = max;
    slider.disabled = false; ttNowBtn.disabled = false;
  }

  async function refreshState(asOf) {
    let data;
    try {
      data = await api("/state" + (asOf ? `?as_of=${asOf}` : ""));
    } catch (e) {
      return;
    }
    if (asOf === null || asOf === undefined) {
      history = data.beliefs; // cache the full (as_of=null) history for slider bounds
      updateSliderBounds();
      liveMode = true;
      ttLabel.textContent = "Live — current beliefs";
      ttLabel.className = "live";
    } else {
      liveMode = false;
      ttLabel.textContent = "Viewing " + fmtTs(asOf);
      ttLabel.className = "past";
    }
    renderBeliefs(data.beliefs);
    updateFooter(data.stats, data.provider);
  }

  let sliderDebounce = null;
  slider.addEventListener("input", () => {
    clearTimeout(sliderDebounce);
    const asOf = Number(slider.value);
    sliderDebounce = setTimeout(() => refreshState(asOf), 120);
  });
  ttNowBtn.addEventListener("click", () => { slider.value = slider.max; refreshState(null); });

  // ---- demo script --------------------------------------------------------
  const DEMO_SCRIPT = [
    "Hi, I'm Alex. I live in Boston and I work as a data engineer.",
    "Actually, I just moved to Seattle last week — new job at a startup there.",
    "My favorite programming language is Python, and I prefer tea over coffee.",
    "Where do I live, and what do you remember about me?",
  ];

  async function typeInto(el, text, speed) {
    el.value = "";
    for (const ch of text) {
      el.value += ch;
      await new Promise((r) => setTimeout(r, speed));
    }
  }

  $("#btn-demo").addEventListener("click", async () => {
    const btn = $("#btn-demo");
    btn.disabled = true;
    for (const line of DEMO_SCRIPT) {
      await typeInto(chatInput, line, 18);
      await sendMessage(chatInput.value);
      await new Promise((r) => setTimeout(r, 900)); // pause so judges can read the reply
    }
    btn.disabled = false;
  });

  $("#btn-reset").addEventListener("click", async () => {
    if (!confirm("Reset this demo session? All chat + beliefs will be cleared.")) return;
    await api("/reset", { method: "POST" });
    messagesEl.innerHTML = "";
    prevStatus = new Map();
    await refreshState(null);
  });

  // ---- boot -----------------------------------------------------------
  (async function boot() {
    if (!hasCookie("tenet_sid")) {
      try { await api("/reset", { method: "POST" }); } catch (e) { /* fall back to shared default */ }
    }
    await refreshState(null);
  })();
})();
</script>
</body>
</html>
