name: publish

# Publishes tenet-memory to PyPI via Trusted Publishing (OIDC).
# No API token is stored anywhere - PyPI trusts this exact repo + workflow.
#
# ONE-TIME setup on pypi.org (no token, ~2 min), before the first release:
#   pypi.org -> your account -> Publishing -> "Add a pending publisher"
#     PyPI Project Name: tenet-memory
#     Owner:             Nas01010101
#     Repository name:   tenet
#     Workflow name:     publish.yml
#   (leave Environment blank)
#
# Then to release: bump `version` in pyproject.toml, and either create a
# GitHub Release (Releases -> Draft a new release -> tag e.g. v0.1.0 -> Publish),
# or run this workflow manually from the Actions tab. It builds and uploads.

on:
  workflow_dispatch:   # manual only — PyPI publishing is opt-in (needs the one-time pending-publisher setup above)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: publish to PyPI (trusted publishing, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
