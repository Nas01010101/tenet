name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      EMBED_PROVIDER: local        # bge-small — no API keys needed
      LLM_PROVIDER: openrouter     # never touched: these tests make no live chat calls
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-${{ runner.os }}
      - run: pip install -q numpy sentence-transformers mcp langgraph
      - name: capability tests (deterministic, no LLM)
        run: python scripts/test_memory.py
      - name: fact-dynamics (world-model) tests (deterministic, no LLM)
        run: python scripts/test_dynamics.py
      - name: uncertainty-aware prompting + MCP surface tests (deterministic, no LLM)
        run: python scripts/test_agent_uncertainty.py
      - name: provider-error-handling tests (deterministic, stubbed chat client, no LLM)
        run: python scripts/test_errors.py
      - name: ollama embedding provider tests (deterministic, stubbed embeddings client, no LLM)
        run: python scripts/test_providers.py
      - name: LangGraph BaseStore adapter tests (deterministic, no LLM)
        run: python scripts/test_langgraph_store.py
      - name: adaptive multi-hop navigation tests (deterministic, no LLM)
        run: python scripts/test_navigate.py
      - name: default-db-path resolution tests (deterministic, no LLM — B1 regression)
        run: python scripts/test_default_db_path.py
      - name: embedding-based key-resolution tests (deterministic, no LLM)
        run: python scripts/test_key_resolution.py
      - name: retraction/tombstone tests (deterministic, distill stubbed, no LLM)
        run: python scripts/test_retract.py
      - name: write-time consolidation tests (deterministic, no LLM)
        run: python scripts/test_consolidate.py
      - name: read-time aggregation tests (deterministic, no LLM)
        run: python scripts/test_aggregate.py
      - name: raw-turn-favored recall tests (deterministic, no LLM)
        run: python scripts/test_raw_recall.py
      - name: Mem0-compatible CRUD facade tests (deterministic, distill stubbed, no LLM)
        run: python scripts/test_mem0_api.py
      - name: ChurnBench generator + scorer tests (deterministic, no LLM)
        run: python scripts/test_churnbench.py
      - name: usage-scenario retrieval tests (deterministic, distill stubbed, no LLM)
        run: python scripts/test_usage_recall.py
      - name: ReMe head-to-head harness tests (deterministic, dry-run stubbed, no LLM, no reme-ai venv)
        run: python scripts/test_reme_h2h.py

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip install -e . in a clean env
        run: pip install -e .
      - name: import + entry-point smoke (catches packaging breaks — missing
          package data, broken console_scripts, ...)
        run: |
          python -c "import tenet; from tenet.memory import MemoryCore"
          tenet --help
