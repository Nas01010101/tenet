<svg width="820" height="190" viewBox="0 0 820 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tenet — agent memory as a self-consistent belief state">

  <!-- wordmark: TENET is a palindrome — mirror-symmetric around the N,
       the way a bi-temporal store reads the same forward and backward in time -->
  <text x="410" y="92" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="72" font-weight="700" letter-spacing="22"
        fill="#e6e3f5">TE<tspan fill="#8b7cf8">N</tspan>ET</text>

  <!-- supersession timeline: past beliefs fade, exactly one is current -->
  <g transform="translate(210,128)">
    <line x1="0" y1="0" x2="130" y2="0" stroke="#8b7cf8" stroke-opacity="0.25" stroke-width="2"/>
    <line x1="130" y1="0" x2="260" y2="0" stroke="#8b7cf8" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="260" y1="0" x2="400" y2="0" stroke="#8b7cf8" stroke-opacity="0.9" stroke-width="2"/>
    <circle cx="60"  cy="0" r="6" fill="#26233a" stroke="#8b7cf8" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="170" cy="0" r="6" fill="#26233a" stroke="#8b7cf8" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="280" cy="0" r="6" fill="#26233a" stroke="#8b7cf8" stroke-opacity="0.85" stroke-width="1.5"/>
    <circle cx="400" cy="0" r="8" fill="#8b7cf8"/>
    <text x="400" y="-14" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
          font-size="11" fill="#8b7cf8">current</text>
  </g>

  <text x="410" y="170" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="15" letter-spacing="2" fill="#9a94b8">agent memory as a self-consistent belief state</text>
</svg>
